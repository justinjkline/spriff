# Force contributors through the structured templates above (no blank issues),
# and route security + open-ended questions to the right place.
blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/justinjkline/spriff/security/advisories/new
    about: Report security issues privately — please do not open a public issue.
  - name: Questions & ideas (Discussions)
    url: https://github.com/justinjkline/spriff/discussions
    about: Ask questions or float early ideas before filing a feature request.
