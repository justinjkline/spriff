name: ci

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the checked-out code. Denying write
# scopes means a compromised third-party action can't use GITHUB_TOKEN to push
# to the repo, open releases, or tamper with checks. (Public-repo hardening.)
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build · test · lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # NOTE: windows-latest is intentionally NOT here yet. This feature was verified
        # green on windows-latest (the `hooks` unit + integration tests all pass under
        # git-for-windows), but a *pre-existing, unrelated* test —
        # `watch_daemon_start_status_idempotent_signal_and_stop` — fails on Windows
        # (the watch-daemon worker exits at startup). Adding the row belongs in its own
        # PR that also fixes/gates that daemon test, not this one. The CRLF risk this
        # would have guarded is already covered platform-independently by the
        # `!HOOK_BODY.contains('\r')` build test + .gitattributes.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Build release
        run: cargo build --release
